name: CI

on:
  push:
    branches: [main, dev, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - run: go build ./cmd/aperture-announce
      - run: go test ./...
      - name: Race detector (packages without go-nostr relay calls)
        run: go test -race ./internal/config/ ./internal/key/ ./internal/validate/
      - run: go vet ./...
      - run: golangci-lint run ./...
